name: "Close stale issues and PRs"

on:
  schedule:
    - cron: "30 1 * * *"

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: "Vấn đề này đã cũ và sẽ bị đóng sớm nếu không có hoạt động nào thêm. Cảm ơn vì sự đóng góp của bạn!"
          stale-pr-message: "PR này đã cũ và sẽ bị đóng sớm nếu không có hoạt động nào thêm. Cảm ơn vì sự đóng góp của bạn!"
          days-before-stale: 60
          days-before-close: 7
